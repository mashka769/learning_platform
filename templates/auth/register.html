<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Обучение программированию</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Дополнительные стили для чекбокса - используем существующие цвета */
        .checkbox-group {
            margin: 0.5rem 0 1rem 0;
        }

        .consent-label {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .consent-label:hover {
            background: rgba(78, 205, 196, 0.05);
        }

        .consent-checkbox {
            margin-top: 0.2rem;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2ecc71;
        }

        .consent-text {
            color: #5a6c65;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .consent-text a {
            color: #4ecdc4;
            text-decoration: none;
        }

        .consent-text a:hover {
            text-decoration: underline;
        }

        /* Стили для всплывающего уведомления */
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff9a76;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(255, 154, 118, 0.3);
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-notification.hide {
            animation: slideOutRight 0.3s ease-out forwards;
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .toast-notification .toast-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .toast-notification .toast-close:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <!-- Добавляем логотип -->
                <div class="logo-container" style="justify-content: center; margin-bottom: 1.5rem;">
                    <img src="{{ url_for('static', filename='images/log11.png') }}" alt="CodeFirst" class="logo">
                </div>
                <h1>Регистрация</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required
                           placeholder="Только буквы и цифры">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required
                           placeholder="Введите ваш email">
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Минимум 6 символов">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Подтвердите пароль:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           placeholder="Повторите пароль">
                </div>

                <!-- Чекбокс согласия на обработку персональных данных с ссылкой на политику -->
                <div class="checkbox-group">
                    <label class="consent-label">
                        <input type="checkbox" id="consentCheckbox" class="consent-checkbox">
                        <span class="consent-text">
                            Я принимаю <a href="{{ url_for('privacy') }}" target="_blank">Политику обработки персональных данных</a> и даю согласие на обработку моих персональных данных
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войдите</a></p>
            </div>
        </div>
    </div>

    <script>
        // Функция для показа всплывающего уведомления
        function showNotification(message) {
            // Удаляем существующее уведомление, если есть
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) {
                existingToast.remove();
            }

            // Создаем новое уведомление
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            `;
            document.body.appendChild(toast);

            // Автоматически скрываем через 4 секунды
            setTimeout(() => {
                if (toast && toast.parentElement) {
                    toast.classList.add('hide');
                    setTimeout(() => {
                        if (toast && toast.parentElement) {
                            toast.remove();
                        }
                    }, 300);
                }
            }, 4000);
        }

        // Обработчик отправки формы
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const consentCheckbox = document.getElementById('consentCheckbox');

            // Проверяем, установлена ли галочка
            if (!consentCheckbox.checked) {
                e.preventDefault(); // Отменяем отправку формы
                showNotification('Пожалуйста, ознакомьтесь с Политикой обработки персональных данных и поставьте галочку о согласии');

                // Добавляем визуальное выделение для чекбокса
                const checkboxGroup = document.querySelector('.checkbox-group');
                checkboxGroup.style.animation = 'shake 0.5s ease-in-out';

                setTimeout(() => {
                    checkboxGroup.style.animation = '';
                }, 500);

                return false;
            }

            // Если галочка установлена, форма отправится normally
            return true;
        });

        // Добавляем анимацию встряхивания
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
